<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection Web App</title>
    <!-- Simple, clean CSS for an optimal viewing experience -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 2.5rem;
            text-align: center;
        }

        .video-container {
            border: 4px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            background-color: #000;
            max-width: 800px;
            width: 100%;
        }

        .video-container img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .info {
            margin-top: 2rem;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>Live Emotion Detection</h1>

    <div class="video-container">
        <!-- The video stream endpoint is linked here -->
        <img src="{{ url_for('video_feed') }}" alt="Live Video Feed">
    </div>

    <div class="info">
        Ensure your webcam is connected and allowed by the browser.
    </div>
</body>

</html>
